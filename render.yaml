services:
  - type: web
    name: cme-checklist-api
    runtime: node
    plan: free
    buildCommand: npm run build --workspace=server
    startCommand: npm run start --workspace=server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    postDeployCommand: npm run prisma:deploy --workspace=server
