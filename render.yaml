services:
  - type: web
    name: cme-checklist-api
    runtime: node
    plan: free
    buildCommand: npm run build --workspace=server
    startCommand: npm run start --workspace=server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    # db:sync (prisma db push) sincroniza o schema direto, sem depender do
    # histórico de migrations (baseline 0_init é vazia). O start também roda
    # db:sync — este postDeploy é redundante para serviços criados manualmente
    # (render.yaml só vale para Blueprints).
    postDeployCommand: npm run db:sync --workspace=server
