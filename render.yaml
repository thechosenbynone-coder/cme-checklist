services:
  - type: web
    name: cme-checklist-api
    runtime: node
    plan: free
    buildCommand: npm run build --workspace=server
    startCommand: npm run start --workspace=server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    # Schema do banco NÃO é sincronizado no build nem no boot. A aplicação de
    # migrations em produção é um passo de deploy EXPLÍCITO (prisma migrate deploy),
    # nunca acoplada a build/start. Se este serviço for recriado como Blueprint,
    # descomente o preDeployCommand abaixo:
    # preDeployCommand: npm run prisma:deploy --workspace=server
    #
    # ATENÇÃO: o serviço atual foi criado MANUALMENTE no painel do Render, então
    # este arquivo é apenas documentação — alterá-lo não altera o serviço. Confira
    # Build/Start/Post-Deploy Command direto no dashboard do Render.
