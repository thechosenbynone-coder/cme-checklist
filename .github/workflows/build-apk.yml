name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Build Web Application
        run: npm run build --workspace=apps/mobile

      - name: Sync Web Assets to Native Android Project
        run: |
          cd apps/mobile
          npx cap sync android

      - name: Package Web Assets as ZIP
        run: |
          cd apps/mobile/dist
          zip -r ../../../dist.zip .

      - name: Build Android Debug APK
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CME-Checklist-Debug-APK
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Get Version from package.json
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./apps/mobile/package.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
            dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
